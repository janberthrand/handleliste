let loadCount=0;
function checkLoaded(){loadCount++;if(loadCount>=4&&!S.loaded){S.loaded=true;render()}}

onValue(itemsRef, snap=>{
  const data=snap.val();
  S.items=data?Object.values(data):[];
  if(S.loaded)render();

});

// ═══════════════════════════════════════
// FIREBASE WRITES
// ═══════════════════════════════════════
function saveItems(){
  const obj={};
  S.items.forEach(i=>{obj[i.id]=i});
  set(itemsRef, obj);
}
function saveStorePrefs(){set(storePrefsRef, S.storePrefs)}
function saveZoneMappings(){set(zoneMappingsRef, S.zoneMappings)}
function saveZoneOrder(){set(zoneOrderRef, S.zoneOrder)}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function getZone(id){return ZONES.find(z=>z.id===id)||ZONES[ZONES.length-1]}
function getStore(id){return STORE_DEFS.find(s=>s.id===id)||STORE_DEFS[0]}

function getZoneForItem(name,storeId){
  const lower=name.toLowerCase().trim();
  const key=storeId+"__"+lower;
  if(S.zoneMappings[key])return S.zoneMappings[key];
  if(COMMON[lower])return COMMON[lower];
  return"annet";
}

function getStoresForItem(name){
  const lower=name.toLowerCase().trim();
  if(S.storePrefs[lower] && Array.isArray(S.storePrefs[lower]))return[...S.storePrefs[lower]];
  return["kiwi"];
}

function isFullyChecked(item){return item.stores&&Array.isArray(item.stores)&&item.stores.every(s=>item.checked&&item.checked[s])}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function addItem(name){
  if(!name.trim())return;
  const lower=name.trim().toLowerCase();
  const existing=S.items.find(i=>i.name.toLowerCase()===lower&&!isFullyChecked(i));
  if(existing){S.inputValue="";S.suggestions=[];render();focusInput();return}
  const stores=getStoresForItem(name.trim());
  const item={id:Date.now().toString()+Math.random().toString(36).slice(2,6),name:name.trim(),stores,checked:{},note:""};
  stores.forEach(sid=>{item["zone_"+sid]=getZoneForItem(name.trim(),sid)});
  S.items.push(item);
  S.inputValue="";S.suggestions=[];
  saveItems();render();focusInput();
}

function toggleItem(itemId,storeId){
  const item=S.items.find(i=>i.id===itemId);
  if(!item)return;
  if(!item.checked)item.checked={};
  item.checked[storeId]=!item.checked[storeId];
  saveItems();render();
}

function removeItem(id){
  S.items=S.items.filter(i=>i.id!==id);
  saveItems();render();
}

function clearChecked(storeId){
  if(storeId==="alle"){
    S.items=S.items.filter(i=>!isFullyChecked(i));
  }else{
    S.items.forEach(i=>{
      if(i.checked&&i.checked[storeId]){
        if(i.stores)i.stores=i.stores.filter(s=>s!==storeId);
        delete i.checked[storeId];
      }
    });
    S.items=S.items.filter(i=>i.stores&&i.stores.length>0);
  }
  saveItems();render();
}

function setItemStores(itemId,newStores){
  const item=S.items.find(i=>i.id===itemId);
  if(!item)return;
  item.stores=newStores;
  newStores.forEach(sid=>{if(!item["zone_"+sid])item["zone_"+sid]=getZoneForItem(item.name,sid)});
  if(item.checked)Object.keys(item.checked).forEach(k=>{if(!newStores.includes(k))delete item.checked[k]});
  S.storePrefs[item.name.toLowerCase().trim()]=newStores;
  S.sheetItem=null;S.sheetType=null;
  saveItems();saveStorePrefs();render();
}

function setItemZone(itemId,storeId,newZone){
  const item=S.items.find(i=>i.id===itemId);
  if(!item)return;
  item["zone_"+storeId]=newZone;
  S.zoneMappings[storeId+"__"+item.name.toLowerCase().trim()]=newZone;
  S.sheetItem=null;S.sheetType=null;
  saveItems();saveZoneMappings();render();
}

function setItemNote(itemId,note){
  const item=S.items.find(i=>i.id===itemId);
  if(item)item.note=note;
  saveItems();
}

function moveZone(storeId,idx,dir){
  const zones=[...(S.zoneOrder[storeId]||ZONES.map(z=>z.id))];
  const ni=idx+dir;
  if(ni<0||ni>=zones.length)return;
  [zones[idx],zones[ni]]=[zones[ni],zones[idx]];
  S.zoneOrder[storeId]=zones;
  saveZoneOrder();render();
}

function updateSuggestions(val){
  if(val.length<2){S.suggestions=[];return}
  const lower=val.toLowerCase();
  const allKnown=[...Object.keys(COMMON),...Object.keys(S.storePrefs),...S.items.map(i=>i.name.toLowerCase())];
  const unique=[...new Set(allKnown)];
  S.suggestions=unique.filter(k=>k.startsWith(lower)&&!S.items.some(i=>i.name.toLowerCase()===k&&!isFullyChecked(i))).slice(0,5);
}

function focusInput(){setTimeout(()=>{const inp=document.getElementById("main-input");if(inp)inp.focus()},60)}

  const label=document.getElementById("sync-label");
  if(label)label.textContent=isOnline?"Synkronisert":"Offline";
}

// ═══════════════════════════════════════
// IMAGE IMPORT
// ═══════════════════════════════════════
function handleImageImport(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    S.importLoading=true;S.importError=null;S.importItems=null;render();

    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=()=>rej(new Error("Kunne ikke lese fil"));
        r.readAsDataURL(file);
      });

      const mediaType=file.type||"image/jpeg";

      const apiKey=localStorage.getItem("hl-apikey")||"";
      if(!apiKey){
        S.importLoading=false;S.importError="Legg inn API-nøkkel under ⚙ Innstillinger";render();return;
      }

      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "anthropic-dangerous-direct-browser-access":"true",
          "anthropic-version":"2023-06-01",
          "x-api-key":apiKey
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
              {type:"text",text:`Du ser et bilde av en oppskrift eller ingrediensliste. Trekk ut alle matvarene/ingrediensene. For hver ingrediens, skriv bare selve varen (f.eks. "løk" ikke "1 stor løk hakket"). Svar KUN med JSON og ingenting annet. Format: {"ingredients":["vare1","vare2"]}. Hvis du ikke finner noen ingredienser, svar {"ingredients":[]}.`}
            ]
          }]
        })
      });

      if(!response.ok){
        const errBody=await response.text();
        console.error("API error:",response.status,errBody);
        throw new Error(response.status+": "+errBody.slice(0,150));
      }

      const data=await response.json();
      if(data.error){
        throw new Error(data.error.message||JSON.stringify(data.error));
      }
      const text=data.content?.map(c=>c.text||"").join("")||"";
      if(!text){
        throw new Error("Tomt svar fra API");
      }
      const clean=text.replace(/```json|```/g,"").trim();
      let parsed;
      try{ parsed=JSON.parse(clean); }catch{ throw new Error("Kunne ikke tolke svar: "+clean.slice(0,100)); }

      if(!parsed.ingredients||!parsed.ingredients.length){
        S.importLoading=false;S.importError="Fant ingen ingredienser i bildet";render();return;
      }

      S.importItems=parsed.ingredients.map(name=>({
        name:name.trim(),
        selected:true,
        zone:getZoneForItem(name.trim(),"kiwi"),
        stores:getStoresForItem(name.trim()),
      }));
      S.importLoading=false;render();

    }catch(err){
      console.error("Import error:",err);
      S.importLoading=false;S.importError=err.message||"Ukjent feil";render();
    }
  };
  input.click();
}

function confirmImport(){
  if(!S.importItems)return;
  S.importItems.filter(i=>i.selected).forEach(imp=>{
    const lower=imp.name.toLowerCase();
    const existing=S.items.find(i=>i.name.toLowerCase()===lower&&!isFullyChecked(i));
    if(existing)return;
    const stores=getStoresForItem(imp.name);
    const item={id:Date.now().toString()+Math.random().toString(36).slice(2,6),name:imp.name,stores,checked:{},note:""};
    stores.forEach(sid=>{item["zone_"+sid]=getZoneForItem(imp.name,sid)});
    S.items.push(item);
  });
  S.importItems=null;S.importLoading=false;S.importError=null;
  saveItems();render();
}

function cancelImport(){
  S.importItems=null;S.importLoading=false;S.importError=null;render();
}

function toggleImportItem(idx){
  if(S.importItems&&S.importItems[idx]){
    S.importItems[idx].selected=!S.importItems[idx].selected;
    render();
  }
}

// ═══════════════════════════════════════
// DOM HELPER
// ═══════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){if(c==null||c===false)continue;el.appendChild(typeof c==="string"?document.createTextNode(c):c)}
  return el;
}

  if(!sc)return;
  sc.innerHTML="";
  if(!S.suggestions.length)return;
  const dd=h("div",{style:{position:"absolute",top:"calc(100% + 6px)",left:"0",right:"60px",background:"#1e293b",border:"1px solid #334155",borderRadius:"14px",overflow:"hidden",zIndex:"20",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}});
  S.suggestions.forEach(s=>{
    const z=getZone(getZoneForItem(s,"kiwi"));
    const storeEmojis=getStoresForItem(s).map(sid=>getStore(sid).emoji).join("");
    dd.appendChild(h("button",{
      style:{width:"100%",padding:"12px 16px",background:"transparent",border:"none",borderBottom:"1px solid #0f172a30",color:"#e2e8f0",fontSize:"15px",display:"flex",alignItems:"center",gap:"10px",textAlign:"left"},
      onMousedown:()=>addItem(s),
    },
      h("span",{},z.emoji),
      h("span",{style:{textTransform:"capitalize",flex:"1"}},s),
      h("span",{style:{fontSize:"13px",marginRight:"4px"}},storeEmojis),
      h("span",{style:{fontSize:"11px",color:"#64748b",background:"#0f172a",padding:"2px 8px",borderRadius:"6px"}},z.name),
    ));
  });
  sc.appendChild(dd);
}

  if(!btn)return;
  const has=S.inputValue.trim();

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(!S.loaded){
    app.appendChild(h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{textAlign:"center",color:"#94a3b8"}},
        h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🛒"),
        h("div",{style:{fontSize:"16px"}},"Kobler til..."),
      )
    ));
    return;
  }

  if(S.view==="settings")app.appendChild(renderSettings());
  else app.appendChild(renderList());

  // Import overlay
  if(S.importLoading||S.importItems||S.importError){
    app.appendChild(renderImportOverlay());
  }
}

  const sid=S.editingStoreId||"kiwi";
  const store=getStore(sid);
  const zones=S.zoneOrder[sid]||ZONES.map(z=>z.id);

  const wrap=h("div",{style:{minHeight:"100vh",background:"#0f172a",paddingBottom:"40px"}});

  wrap.appendChild(h("div",{style:{padding:"16px 20px",display:"flex",alignItems:"center",gap:"12px",borderBottom:"1px solid #1e293b",position:"sticky",top:"0",zIndex:"10",background:"#0f172a"}},
    h("button",{style:{background:"none",border:"none",color:"#60a5fa",fontSize:"16px",padding:"4px 0"},onClick:()=>{S.view="list";render()}},"← Tilbake"),
    h("span",{style:{fontSize:"18px",fontWeight:"600"}},"Innstillinger"),
  ));

  const content=h("div",{style:{padding:"20px"}});

  content.appendChild(h("label",{style:{fontSize:"12px",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px",display:"block"}},"Velg butikk"));
  const tabs=h("div",{style:{display:"flex",gap:"6px",marginBottom:"24px"}});
  STORE_DEFS.forEach(sd=>{
    const active=sid===sd.id;
    tabs.appendChild(h("button",{
      style:{flex:"1",padding:"10px",borderRadius:"12px",border:active?"2px solid "+sd.color:"2px solid #334155",background:active?sd.color+"20":"transparent",color:active?sd.color:"#94a3b8",fontSize:"14px",fontWeight:"600",textAlign:"center"},
      onClick:()=>{S.editingStoreId=sd.id;render()},
    },sd.emoji+" "+sd.name));
  });
  content.appendChild(tabs);

  content.appendChild(h("label",{style:{fontSize:"12px",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px",display:"block"}},"Sonerekkefølge – ruten gjennom "+store.name));

  zones.forEach((zid,idx)=>{
    const z=getZone(zid);
    content.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:"#1e293b",borderRadius:"12px",marginBottom:"6px"}},
      h("span",{style:{fontSize:"13px",color:"#64748b",fontWeight:"700",width:"24px",textAlign:"center"}},String(idx+1)),
      h("span",{style:{fontSize:"20px"}},z.emoji),
      h("span",{style:{flex:"1",fontSize:"15px",fontWeight:"500"}},z.name),
      h("div",{style:{display:"flex",gap:"4px"}},
        h("button",{
          style:{width:"36px",height:"36px",borderRadius:"8px",border:"none",background:idx===0?"#1e293b":"#334155",color:idx===0?"#475569":"#e2e8f0",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"},
          onClick:()=>moveZone(sid,idx,-1),
        },"↑"),
        h("button",{
          style:{width:"36px",height:"36px",borderRadius:"8px",border:"none",background:idx===zones.length-1?"#1e293b":"#334155",color:idx===zones.length-1?"#475569":"#e2e8f0",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"},
          onClick:()=>moveZone(sid,idx,1),
        },"↓"),
      ),
    ));
  });

  const prefKeys=Object.keys(S.storePrefs).filter(k=>{
    const p=S.storePrefs[k];
    return Array.isArray(p)&&(p.includes("meny")||p.includes("andre")||p.length>1);
  });
  if(prefKeys.length>0){
    content.appendChild(h("label",{style:{fontSize:"12px",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginTop:"28px",marginBottom:"10px",display:"block"}},"Lagrede butikkvalg"));
    prefKeys.sort().forEach(k=>{
      const stores=S.storePrefs[k];
      const labels=stores.map(s=>getStore(s).emoji+" "+getStore(s).name).join(", ");
      content.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"10px 14px",background:"#1e293b",borderRadius:"10px",marginBottom:"4px"}},
        h("span",{style:{flex:"1",fontSize:"14px",textTransform:"capitalize"}},k),
        h("span",{style:{fontSize:"12px",color:"#94a3b8"}},labels),
        h("button",{style:{background:"none",border:"none",color:"#ef4444",fontSize:"14px",padding:"4px 8px"},onClick:()=>{delete S.storePrefs[k];saveStorePrefs();render()}},"✕"),
      ));
    });
  }

  // API key for image import
  content.appendChild(h("label",{style:{fontSize:"12px",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginTop:"28px",marginBottom:"10px",display:"block"}},"📷 Bildeimport (Anthropic API-nøkkel)"));
  content.appendChild(h("div",{style:{fontSize:"13px",color:"#64748b",marginBottom:"10px"}},"Trengs for å lese oppskrifter fra bilder. Hent nøkkel fra console.anthropic.com"));
  const apiKeyInput=h("input",{
    value:localStorage.getItem("hl-apikey")||"",
    placeholder:"sk-ant-...",
    type:"password",
    style:{width:"100%",padding:"12px 16px",background:"#0f172a",border:"2px solid #334155",borderRadius:"12px",color:"#e2e8f0",fontSize:"14px",outline:"none",fontFamily:"monospace"},
    onInput:e=>{localStorage.setItem("hl-apikey",e.target.value)},
    onFocus:e=>e.target.style.borderColor="#60a5fa",
    onBlur:e=>e.target.style.borderColor="#334155",
  });
  content.appendChild(apiKeyInput);

  wrap.appendChild(content);
  return wrap;
}

// ─── MAIN LIST ───
function renderList(){
  const tab=S.activeTab;
  const wrap=h("div",{style:{minHeight:"100vh",background:"#0f172a",paddingBottom:"100px"}});

  const header=h("div",{style:{padding:"20px 20px 0",position:"sticky",top:"0",zIndex:"10",background:"#0f172a"}});

  const titleRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}});
  const titleLeft=h("div",{});
  titleLeft.appendChild(h("h1",{style:{fontSize:"26px",fontWeight:"800",letterSpacing:"-0.5px",color:"#e2e8f0"}},"Handleliste"));
  const syncRow=h("div",{style:{display:"flex",alignItems:"center",marginTop:"4px"}});
  syncRow.appendChild(h("span",{id:"sync-dot",className:"sync-dot "+(isOnline?"online":"offline")}));
  syncRow.appendChild(h("span",{id:"sync-label",style:{fontSize:"11px",color:"#64748b"}},isOnline?"Synkronisert":"Offline"));
  titleLeft.appendChild(syncRow);
  titleRow.appendChild(titleLeft);

  const headerBtns=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
  let viewItems=tab==="alle"?S.items:S.items.filter(i=>i.stores&&i.stores.includes(tab));
  const checkedCount=tab==="alle"?S.items.filter(i=>isFullyChecked(i)).length:viewItems.filter(i=>i.checked&&i.checked[tab]).length;

  if(checkedCount>0){
    headerBtns.appendChild(h("button",{
      style:{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",color:"#f87171",borderRadius:"12px",padding:"7px 12px",fontSize:"12px",fontWeight:"600"},
      onClick:()=>clearChecked(tab),
    },"Fjern ✓ ("+checkedCount+")"));
  }

  headerBtns.appendChild(h("button",{
    style:{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:"10px",padding:"7px 12px",fontSize:"18px"},
    onClick:()=>{S.view="settings";S.editingStoreId="kiwi";render()},
  },"⚙"));

  titleRow.appendChild(headerBtns);
  header.appendChild(titleRow);

  const tabBar=h("div",{style:{display:"flex",gap:"4px",background:"#1e293b",borderRadius:"14px",padding:"4px",marginBottom:"14px"}});
  const tabDefs=[...STORE_DEFS,{id:"alle",name:"Alle",emoji:"📋",color:"#60a5fa"}];
  tabDefs.forEach(td=>{
    const count=td.id==="alle"?S.items.filter(i=>!isFullyChecked(i)).length:S.items.filter(i=>i.stores&&i.stores.includes(td.id)&&!(i.checked&&i.checked[td.id])).length;
    const active=tab===td.id;
    tabBar.appendChild(h("button",{
      style:{flex:"1",padding:"9px 4px",border:"none",borderRadius:"11px",fontSize:"13px",fontWeight:"600",textAlign:"center",transition:"all 0.2s",background:active?td.color:"transparent",color:active?"#0f172a":"#64748b"},
      onClick:()=>{S.activeTab=td.id;localStorage.setItem("hl-tab",td.id);render()},
    },
      h("span",{},td.emoji),
      count>0?h("span",{style:{marginLeft:"4px"}},String(count)):null,
    ));
  });
  header.appendChild(tabBar);

  const inputWrap=h("div",{style:{position:"relative",paddingBottom:"16px"}});
  const inputRow=h("div",{style:{display:"flex",gap:"8px"}});
  inputRow.appendChild(h("input",{
    id:"main-input",value:S.inputValue,placeholder:"Legg til vare...",
    style:{flex:"1",padding:"14px 18px",background:"#1e293b",border:"2px solid #334155",borderRadius:"16px",color:"#e2e8f0",fontSize:"16px",outline:"none",minWidth:"0",transition:"border-color 0.2s"},
    onInput:e=>{S.inputValue=e.target.value;updateSuggestions(e.target.value);renderSuggestions();updateAddBtn()},
    onKeydown:e=>{if(e.key==="Enter")addItem(S.inputValue)},
    onFocus:e=>e.target.style.borderColor="#60a5fa",
    onBlur:e=>{setTimeout(()=>{e.target.style.borderColor="#334155";S.suggestions=[];renderSuggestions()},200)},
  }));
  inputRow.appendChild(h("button",{
    id:"add-btn",
    style:{width:"52px",height:"52px",border:"none",borderRadius:"16px",fontSize:"24px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",transition:"all 0.2s",
      background:S.inputValue.trim()?"linear-gradient(135deg,#60a5fa,#3b82f6)":"#1e293b",
      color:S.inputValue.trim()?"#fff":"#475569"},
    onClick:()=>addItem(S.inputValue),
  },"+"));
  inputRow.appendChild(h("button",{
    style:{width:"52px",height:"52px",border:"none",borderRadius:"16px",fontSize:"22px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",background:"#1e293b",color:"#94a3b8",transition:"all 0.2s"},
    onClick:handleImageImport,
  },"📷"));
  inputWrap.appendChild(inputRow);
  inputWrap.appendChild(h("div",{id:"sug-container"}));
  header.appendChild(inputWrap);
  wrap.appendChild(header);

  const list=h("div",{style:{padding:"0 20px"}});
  let displayItems=tab==="alle"?S.items.filter(i=>!isFullyChecked(i)):S.items.filter(i=>i.stores&&i.stores.includes(tab));

  if(displayItems.length===0){
    list.appendChild(h("div",{style:{textAlign:"center",padding:"60px 20px",color:"#475569"}},
      h("div",{style:{fontSize:"48px",marginBottom:"16px"}},"🛒"),
      h("div",{style:{fontSize:"17px",fontWeight:"600",marginBottom:"6px"}},tab==="alle"?"Handlelisten er tom":"Ingen varer på "+getStore(tab).name),
      h("div",{style:{fontSize:"14px"}},"Legg til varer ovenfor"),
    ));
  } else if(tab==="alle"){
    STORE_DEFS.forEach(sd=>{
      const storeItems=displayItems.filter(i=>i.stores&&i.stores.includes(sd.id)&&!(i.checked&&i.checked[sd.id]));
      if(!storeItems.length)return;
      const sh=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"14px 0 8px"}});
      sh.appendChild(h("span",{style:{fontSize:"16px"}},sd.emoji));
      sh.appendChild(h("span",{style:{fontSize:"14px",fontWeight:"700",color:sd.color}},sd.name));
      sh.appendChild(h("span",{style:{fontSize:"12px",color:"#64748b",background:"#1e293b",padding:"2px 10px",borderRadius:"8px"}},storeItems.length+" vare"+(storeItems.length!==1?"r":"")));
      sh.appendChild(h("div",{style:{flex:"1",height:"1px",background:sd.color+"30"}}));
      list.appendChild(sh);
      storeItems.forEach(item=>list.appendChild(renderItemRow(item,sd.id,true)));
    });
  } else {
    const zoneOrder=S.zoneOrder[tab]||ZONES.map(z=>z.id);
    const uncheckedItems=displayItems.filter(i=>!(i.checked&&i.checked[tab]));
    const checkedItems=displayItems.filter(i=>i.checked&&i.checked[tab]);

    const grouped=zoneOrder.map(zid=>({
      zone:getZone(zid),
      items:uncheckedItems.filter(i=>(i["zone_"+tab]||getZoneForItem(i.name,tab))===zid),
    })).filter(g=>g.items.length>0);

    grouped.forEach(({zone,items})=>{
      const zh=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 0 6px"}});
      zh.appendChild(h("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:zone.color,boxShadow:"0 0 8px "+zone.color+"50"}}));
      zh.appendChild(h("span",{style:{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",color:zone.color}},zone.emoji+" "+zone.name));
      zh.appendChild(h("div",{style:{flex:"1",height:"1px",background:zone.color+"20"}}));
      list.appendChild(zh);
      items.forEach(item=>list.appendChild(renderItemRow(item,tab,false)));
    });

    if(checkedItems.length>0){
      list.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"16px 0 8px"}},
        h("span",{style:{fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",color:"#475569"}},"✓ Ferdig"),
        h("div",{style:{flex:"1",height:"1px",background:"#1e293b"}}),
      ));
      checkedItems.forEach(item=>list.appendChild(renderItemRow(item,tab,false)));
    }
  }

  wrap.appendChild(list);
  addBottomSheet(wrap);
  return wrap;
}

function renderItemRow(item,storeId,showStoreBadge){
  const isChecked=item.checked&&!!item.checked[storeId];
  const zoneId=item["zone_"+storeId]||getZoneForItem(item.name,storeId);
  const zone=getZone(zoneId);

  const row=h("div",{
    className:"item-enter",
    style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",borderRadius:"14px",marginBottom:"4px",transition:"all 0.2s",background:isChecked?"transparent":"#1e293b",border:isChecked?"1px solid transparent":"1px solid #1e293b",opacity:isChecked?"0.35":"1"},
  });

  row.appendChild(h("button",{
    style:{width:"28px",height:"28px",borderRadius:"8px",border:isChecked?"none":"2px solid "+zone.color+"60",background:isChecked?zone.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",color:"#0f172a",flexShrink:"0",transition:"all 0.15s"},
    onClick:()=>toggleItem(item.id,storeId),
  },isChecked?"✓":""));

  const nameCol=h("div",{style:{flex:"1",minWidth:"0"}});
  const nameRow=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
  nameRow.appendChild(h("span",{style:{fontSize:"15px",fontWeight:"500",textTransform:"capitalize",textDecoration:isChecked?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.name));

  if(showStoreBadge&&item.stores&&item.stores.length>1){
    item.stores.forEach(sid=>{
      if(sid===storeId)return;
      nameRow.appendChild(h("span",{style:{fontSize:"11px",opacity:"0.6"}},getStore(sid).emoji));
    });
  }
  nameCol.appendChild(nameRow);

  if(item.note){
    nameCol.appendChild(h("div",{style:{fontSize:"12px",color:"#64748b",marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.note));
  }
  row.appendChild(nameCol);

  const actions=h("div",{style:{display:"flex",alignItems:"center",gap:"2px",flexShrink:"0"}});
  if(item.stores&&item.stores.length>1)actions.appendChild(h("span",{style:{fontSize:"12px",opacity:"0.5"}},"📌"));

  actions.appendChild(h("button",{
    style:{background:"none",border:"none",fontSize:"16px",padding:"6px",opacity:"0.5"},
    onClick:()=>{S.sheetItem=item.id;S.sheetType="zone";render()},
  },zone.emoji));

  actions.appendChild(h("button",{
    style:{background:"none",border:"none",fontSize:"14px",padding:"6px",color:"#64748b"},
    onClick:()=>{S.sheetItem=item.id;S.sheetType="store";render()},
  },"•••"));

  actions.appendChild(h("button",{
    style:{background:"none",border:"none",color:"#475569",fontSize:"20px",padding:"4px 2px",lineHeight:"1"},
    onClick:()=>removeItem(item.id),
  },"×"));

  row.appendChild(actions);
  return row;
}

function addBottomSheet(wrap){
  if(!S.sheetItem)return;
  const item=S.items.find(i=>i.id===S.sheetItem);
  if(!item)return;

  const overlay=h("div",{
    style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.6)",zIndex:"100",display:"flex",alignItems:"flex-end",justifyContent:"center"},
    onClick:()=>{S.sheetItem=null;S.sheetType=null;render()},
  });

  const sheet=h("div",{
    className:"bottom-sheet",
    style:{background:"#1e293b",borderRadius:"20px 20px 0 0",padding:"20px",width:"100%",maxWidth:"500px",maxHeight:"70vh",overflow:"auto",paddingBottom:"calc(20px + env(safe-area-inset-bottom, 0px))"},
    onClick:e=>e.stopPropagation(),
  });

  sheet.appendChild(h("div",{style:{width:"40px",height:"4px",background:"#475569",borderRadius:"2px",margin:"0 auto 16px"}}));

  if(S.sheetType==="store"){
    sheet.appendChild(h("div",{style:{fontSize:"16px",fontWeight:"700",textAlign:"center",marginBottom:"6px"}},"Butikk for «"+item.name+"»"));
    sheet.appendChild(h("div",{style:{fontSize:"13px",color:"#64748b",textAlign:"center",marginBottom:"16px"}},"Trykk for å velge butikk – appen husker valget"));

    // Single store buttons
    STORE_DEFS.forEach(sd=>{
      const isOnly=item.stores&&item.stores.length===1&&item.stores[0]===sd.id;
      sheet.appendChild(h("button",{
        style:{width:"100%",padding:"14px 16px",borderRadius:"12px",color:"#e2e8f0",fontSize:"15px",display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px",textAlign:"left",background:isOnly?sd.color+"20":"transparent",border:isOnly?"1px solid "+sd.color+"40":"1px solid transparent"},
        onClick:()=>setItemStores(item.id,[sd.id]),
      },
        h("span",{style:{fontSize:"22px"}},sd.emoji),
        h("span",{style:{flex:"1",fontWeight:isOnly?"600":"400"}},sd.name),
        isOnly?h("span",{style:{color:sd.color,fontSize:"18px"}},"✓"):null,
      ));
    });

    // Multi-store combinations
    sheet.appendChild(h("div",{style:{height:"1px",background:"#334155",margin:"12px 0"}}));
    sheet.appendChild(h("div",{style:{fontSize:"12px",color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px"}},"Flere butikker"));

    const combos=[
      {stores:["kiwi","meny"],label:"Kiwi + Meny",emojis:"🥝🟡"},
      {stores:["kiwi","andre"],label:"Kiwi + Andre",emojis:"🥝🏬"},
      {stores:["meny","andre"],label:"Meny + Andre",emojis:"🟡🏬"},
      {stores:["kiwi","meny","andre"],label:"Alle tre",emojis:"🥝🟡🏬"},
    ];
    combos.forEach(c=>{
      const isMatch=item.stores&&c.stores.length===item.stores.length&&c.stores.every(s=>item.stores.includes(s));
      sheet.appendChild(h("button",{
        style:{width:"100%",padding:"12px 16px",borderRadius:"12px",color:"#e2e8f0",fontSize:"14px",display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px",textAlign:"left",background:isMatch?"#60a5fa20":"transparent",border:isMatch?"1px solid #60a5fa40":"1px solid transparent"},
        onClick:()=>setItemStores(item.id,[...c.stores]),
      },
        h("span",{style:{fontSize:"18px"}},c.emojis),
        h("span",{style:{flex:"1",fontWeight:isMatch?"600":"400"}},c.label),
        isMatch?h("span",{style:{color:"#60a5fa",fontSize:"18px"}},"✓"):null,
      ));
    });

    sheet.appendChild(h("div",{style:{marginTop:"16px"}}));
    sheet.appendChild(h("label",{style:{fontSize:"12px",color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"8px",display:"block"}},"Notat (valgfritt)"));
    sheet.appendChild(h("input",{
      value:item.note||"",placeholder:"F.eks. den store pakken, økologisk...",
      style:{width:"100%",padding:"12px 16px",background:"#0f172a",border:"2px solid #334155",borderRadius:"12px",color:"#e2e8f0",fontSize:"15px",outline:"none"},
      onInput:e=>setItemNote(item.id,e.target.value),
      onFocus:e=>e.target.style.borderColor="#60a5fa",
      onBlur:e=>e.target.style.borderColor="#334155",
    }));

  } else if(S.sheetType==="zone"){
    const currentStoreId=S.activeTab==="alle"?"kiwi":S.activeTab;
    const currentZone=item["zone_"+currentStoreId]||getZoneForItem(item.name,currentStoreId);
    const store=getStore(currentStoreId);

    sheet.appendChild(h("div",{style:{fontSize:"16px",fontWeight:"700",textAlign:"center",marginBottom:"4px"}},"Sone for «"+item.name+"»"));
    sheet.appendChild(h("div",{style:{fontSize:"13px",color:"#64748b",textAlign:"center",marginBottom:"16px"}},"På "+store.name+" – appen husker valget"));

    const zones=S.zoneOrder[currentStoreId]||ZONES.map(z=>z.id);
    zones.forEach(zid=>{
      const z=getZone(zid);
      const isActive=currentZone===zid;
      sheet.appendChild(h("button",{
        style:{width:"100%",padding:"14px 16px",borderRadius:"12px",color:"#e2e8f0",fontSize:"15px",display:"flex",alignItems:"center",gap:"12px",marginBottom:"4px",textAlign:"left",background:isActive?z.color+"20":"transparent",border:isActive?"1px solid "+z.color+"40":"1px solid transparent"},
        onClick:()=>setItemZone(item.id,currentStoreId,zid),
      },
        h("span",{style:{fontSize:"22px"}},z.emoji),
        h("span",{style:{flex:"1",fontWeight:isActive?"600":"400"}},z.name),
        isActive?h("span",{style:{color:z.color}},"✓"):null,
      ));
    });
  }

  overlay.appendChild(sheet);
  wrap.appendChild(overlay);
}

// ─── IMPORT OVERLAY ───
function renderImportOverlay(){
  const overlay=h("div",{
    style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",zIndex:"200",display:"flex",alignItems:"flex-end",justifyContent:"center"},
    onClick:()=>{if(!S.importLoading)cancelImport()},
  });

  const sheet=h("div",{
    className:"bottom-sheet",
    style:{background:"#1e293b",borderRadius:"20px 20px 0 0",padding:"20px",width:"100%",maxWidth:"500px",maxHeight:"85vh",overflow:"auto",paddingBottom:"calc(20px + env(safe-area-inset-bottom, 0px))"},
    onClick:e=>e.stopPropagation(),
  });

  sheet.appendChild(h("div",{style:{width:"40px",height:"4px",background:"#475569",borderRadius:"2px",margin:"0 auto 16px"}}));

  if(S.importLoading){
    sheet.appendChild(h("div",{style:{textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:"40px",marginBottom:"16px"}},"🔍"),
      h("div",{style:{fontSize:"16px",fontWeight:"600",marginBottom:"8px",color:"#e2e8f0"}},"Leser oppskriften..."),
      h("div",{style:{fontSize:"13px",color:"#64748b"}},"Claude analyserer bildet"),
    ));
  } else if(S.importError){
    sheet.appendChild(h("div",{style:{textAlign:"center",padding:"40px 20px"}},
      h("div",{style:{fontSize:"40px",marginBottom:"16px"}},"😕"),
      h("div",{style:{fontSize:"16px",fontWeight:"600",marginBottom:"8px",color:"#e2e8f0"}},S.importError),
      h("button",{
        style:{marginTop:"16px",padding:"12px 24px",background:"#334155",border:"none",borderRadius:"12px",color:"#e2e8f0",fontSize:"15px",fontWeight:"600"},
        onClick:cancelImport,
      },"Lukk"),
    ));
  } else if(S.importItems){
    const selectedCount=S.importItems.filter(i=>i.selected).length;

    sheet.appendChild(h("div",{style:{fontSize:"16px",fontWeight:"700",textAlign:"center",marginBottom:"4px"}},"Ingredienser funnet"));
    sheet.appendChild(h("div",{style:{fontSize:"13px",color:"#64748b",textAlign:"center",marginBottom:"16px"}},"Velg hva du vil legge til ("+selectedCount+" valgt)"));

    S.importItems.forEach((imp,idx)=>{
      const zone=getZone(imp.zone);
      const storeEmojis=imp.stores.map(s=>getStore(s).emoji).join(" ");
      sheet.appendChild(h("button",{
        style:{
          width:"100%",padding:"12px 16px",borderRadius:"12px",marginBottom:"4px",
          display:"flex",alignItems:"center",gap:"12px",textAlign:"left",
          background:imp.selected?"#0f172a":"transparent",
          border:imp.selected?"1px solid #334155":"1px solid transparent",
          color:"#e2e8f0",fontSize:"15px",opacity:imp.selected?"1":"0.4",
          transition:"all 0.15s",
        },
        onClick:()=>toggleImportItem(idx),
      },
        h("span",{style:{
          width:"24px",height:"24px",borderRadius:"6px",
          border:imp.selected?"none":"2px solid #475569",
          background:imp.selected?"#4ade80":"transparent",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"13px",color:"#0f172a",flexShrink:"0",
        }},imp.selected?"✓":""),
        h("span",{style:{fontSize:"16px",flexShrink:"0"}},zone.emoji),
        h("span",{style:{flex:"1",textTransform:"capitalize",fontWeight:"500"}},imp.name),
        h("span",{style:{fontSize:"12px",color:"#64748b"}},storeEmojis),
      ));
    });

    // Action buttons
    const btnRow=h("div",{style:{display:"flex",gap:"8px",marginTop:"16px",position:"sticky",bottom:"0",background:"#1e293b",paddingTop:"12px"}});

    btnRow.appendChild(h("button",{
      style:{flex:"1",padding:"14px",background:"#334155",border:"none",borderRadius:"14px",color:"#94a3b8",fontSize:"15px",fontWeight:"600"},
      onClick:cancelImport,
    },"Avbryt"));

    btnRow.appendChild(h("button",{
      style:{flex:"2",padding:"14px",background:selectedCount>0?"linear-gradient(135deg,#4ade80,#22c55e)":"#334155",border:"none",borderRadius:"14px",color:selectedCount>0?"#0f172a":"#64748b",fontSize:"15px",fontWeight:"700"},
      onClick:()=>{if(selectedCount>0)confirmImport()},
    },"Legg til "+selectedCount+" vare"+(selectedCount!==1?"r":"")));

    sheet.appendChild(btnRow);
  }

  overlay.appendChild(sheet);
  return overlay;
}

render();
</script>
</body>
</html>
